services:
  doris-fe:
    image: apache/doris:fe-4.0.6
    container_name: autobi-doris-fe
    hostname: doris-fe
    environment:
      FE_SERVERS: fe1:172.28.0.2:9010
      FE_ID: "1"
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - doris-fe-meta:/opt/apache-doris/fe/doris-meta
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "priority_networks = 172.28.0.0/24" >> /opt/apache-doris/fe/conf/fe.conf
        sed -i 's/-Xmx8192m/-Xmx4096m/g; s/-Xms8192m/-Xms4096m/g' /opt/apache-doris/fe/conf/fe.conf
        /opt/apache-doris/fe/bin/start_fe.sh --daemon
        until curl -fsS http://127.0.0.1:8030/api/bootstrap 2>/dev/null | grep -q '"msg"'; do sleep 2; done
        echo "FE HTTP API is ready"
        until mysql -h 127.0.0.1 -P 9030 -uroot -e "SHOW FRONTENDS" 2>/dev/null; do sleep 2; done
        echo "FE MySQL port is ready"
        mysql -h 127.0.0.1 -P 9030 -uroot -e "CREATE DATABASE IF NOT EXISTS autobi;"
        tail -F /opt/apache-doris/fe/log/fe.log
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8030/api/bootstrap || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      doris-net:
        ipv4_address: 172.28.0.2

  doris-be:
    image: apache/doris:be-4.0.6
    container_name: autobi-doris-be
    hostname: doris-be
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: fe1:172.28.0.2:9010
      BE_ADDR: 172.28.0.3:9050
    ports:
      - "8040:8040"
      - "9050:9050"
    volumes:
      - doris-be-storage:/opt/apache-doris/be/storage
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "priority_networks = 172.28.0.0/24" >> /opt/apache-doris/be/conf/be.conf
        until mysql -h doris-fe -P 9030 -uroot -e "SHOW FRONTENDS" 2>/dev/null; do sleep 2; done
        mysql -h doris-fe -P 9030 -uroot -e "ALTER SYSTEM ADD BACKEND 'doris-be:9050';" || true
        sed -i 's/exit 1/echo "Bypassed exit"/g' /opt/apache-doris/be/bin/start_be.sh
        /opt/apache-doris/be/bin/start_be.sh --daemon
        tail -F /opt/apache-doris/be/log/be.INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8040/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      doris-net:
        ipv4_address: 172.28.0.3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: autobi-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      doris-fe:
        condition: service_healthy
      doris-be:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DORIS_HOST: doris-fe
      DORIS_QUERY_PORT: "9030"
      DORIS_USER: root
      DORIS_PASSWORD: ""
      DORIS_DATABASE: autobi
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      doris-net:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: autobi-frontend
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    networks:
      doris-net:

  nginx:
    image: nginx:alpine
    container_name: autobi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      doris-net:

volumes:
  doris-fe-meta:
  doris-be-storage:

networks:
  doris-net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
